

<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Barnehagekaos V3</title>

<style>
:root{
  --bg:#f5efe3;
  --card:#fffaf0;
  --text:#2f261f;
  --muted:#7a6a5c;
  --line:#e5d7c4;
  --danger:#c0392b;
  --good:#2e7d32;
  --blue:#2f80ed;
  --yellow:#f2c94c;
  --purple:#9b51e0;
  --shadow:0 16px 40px rgba(47,38,31,.12);
  --radius:22px;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 10%, rgba(242,201,76,.25), transparent 28%),
    radial-gradient(circle at 80% 20%, rgba(47,128,237,.14), transparent 28%),
    var(--bg);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
  padding:20px;
}

.app{
  max-width:1280px;
  margin:0 auto;
  display:grid;
  gap:18px;
}

header,.panel,.stat{
  background:rgba(255,250,240,.92);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}

header{padding:22px}

h1{
  margin:0;
  font-size:clamp(2.6rem,5vw,5rem);
  letter-spacing:-.08em;
  line-height:.9;
}

.subtitle{
  margin-top:10px;
  color:var(--muted);
  max-width:800px;
}

.top{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
}

.stat{
  padding:16px;
}

.label{
  font-size:.75rem;
  color:var(--muted);
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.value{
  font-size:1.9rem;
  font-weight:950;
  margin-top:4px;
}

main{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:18px;
}

.panel{
  padding:18px;
}

h2{
  margin:0 0 12px;
  letter-spacing:-.03em;
}

.banner{
  padding:12px 14px;
  border-radius:16px;
  background:#efe1c8;
  font-weight:900;
}

.banner.danger{
  background:#ffe1dd;
  color:var(--danger);
}

.track{
  margin-top:12px;
  display:flex;
  gap:6px;
  overflow:auto;
  padding-bottom:6px;
}

.space{
  flex:0 0 58px;
  height:72px;
  border-radius:16px;
  background:#f0e5d4;
  border:1px solid #dbc8af;
  position:relative;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  font-weight:900;
  padding-bottom:6px;
  color:#5e4f42;
}

.space.bonus{
  background:#fff1bf;
}

.space.ruby{
  background:#dbeeff;
}

.space.active{
  outline:4px solid #2f261f;
  transform:translateY(-4px);
}

.space .reward{
  position:absolute;
  top:4px;
  font-size:.72rem;
  font-weight:800;
}

.cauldron{
  min-height:230px;
  margin-top:14px;
  border-radius:18px;
  border:1px dashed #d7c5ae;
  background:rgba(255,255,255,.45);
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-content:flex-start;
  padding:14px;
}

.empty{
  color:var(--muted);
  font-weight:700;
  padding:20px;
}

.chip{
  width:82px;
  height:82px;
  border-radius:50%;
  display:grid;
  place-items:center;
  text-align:center;
  position:relative;
  padding:8px;
  font-size:.65rem;
  font-weight:950;
  border:3px solid rgba(0,0,0,.12);
  box-shadow:0 8px 16px rgba(47,38,31,.15);
}

.chip .emoji{
  font-size:1rem;
  display:block;
  line-height:1;
  margin-bottom:2px;
}

.chip .num{
  position:absolute;
  top:-6px;
  right:-4px;
  width:30px;
  height:30px;
  border-radius:50%;
  background:#2f261f;
  color:white;
  display:grid;
  place-items:center;
  font-size:1rem;
  border:2px solid white;
}

.white{background:#f8f8f8}
.red{background:#ffb3a8}
.blue{background:#b8d7ff}
.green{background:#bdf0c9}
.yellow{background:#ffeaa2}
.purple{background:#dfc3ff}

.controls{
  margin-top:16px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

button{
  border:0;
  border-radius:16px;
  padding:14px;
  font-weight:950;
  cursor:pointer;
  color:white;
  background:#2f261f;
  box-shadow:0 10px 22px rgba(47,38,31,.18);
}

button:disabled{
  opacity:.45;
  cursor:not-allowed;
}

.stop{background:var(--good)}
.next{background:var(--blue)}
.reset{background:#8c6f5a}
.buy{background:#7048a8;padding:10px 12px;font-size:.88rem}

.side{
  display:grid;
  gap:18px;
}

.shop{
  display:grid;
  gap:10px;
}

.shop-item{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:10px;
  align-items:center;
  padding:10px;
  background:rgba(255,255,255,.55);
  border:1px solid var(--line);
  border-radius:18px;
}

.log{
  display:grid;
  gap:8px;
  max-height:240px;
  overflow:auto;
}

.log p{
  margin:0;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(255,255,255,.55);
  border:1px solid var(--line);
  color:var(--muted);
  font-weight:700;
}

@media(max-width:950px){
  .top{grid-template-columns:repeat(2,1fr)}
  main{grid-template-columns:1fr}
  .controls{grid-template-columns:1fr 1fr}
}
</style>
</head>

<body>

<div class="app">

<header>
  <h1>Barnehagekaos</h1>
  <div class="subtitle">
    Nå med ekte grytespor 😈 Bare én brikke til...
  </div>
</header>

<section class="top">
  <div class="stat">
    <div class="label">Runde</div>
    <div class="value" id="round">1 / 7</div>
  </div>

  <div class="stat">
    <div class="label">Trygghetspoeng</div>
    <div class="value" id="score">0</div>
  </div>

  <div class="stat">
    <div class="label">Klistremerker</div>
    <div class="value" id="money">0</div>
  </div>

  <div class="stat">
    <div class="label">Kaos</div>
    <div class="value" id="chaos">0 / 8</div>
  </div>

  <div class="stat">
    <div class="label">Posisjon</div>
    <div class="value" id="position">0</div>
  </div>
</section>

<main>

<section class="panel">

  <h2>Dagens avdeling</h2>

  <div class="banner" id="banner">
    Trekk en brikke. Stopp før avdelingen koker over.
  </div>

  <div class="track" id="track"></div>

  <div class="cauldron" id="drawn">
    <div class="empty">Ingen barn i gryta ennå. Litt FOR rolig.</div>
  </div>

  <div class="controls">
    <button id="drawBtn">Trekk barn</button>
    <button class="stop" id="stopBtn">Stopp dagen</button>
    <button class="next" id="nextBtn" disabled>Neste runde</button>
    <button class="reset" id="resetBtn">Start på nytt</button>
  </div>

</section>

<aside class="side">

<section class="panel">
  <h2>Kjøp bedre avdeling</h2>
  <div class="shop" id="shop"></div>
</section>

<section class="panel">
  <h2>Hva skjer?</h2>
  <div class="log" id="log"></div>
</section>

</aside>

</main>

</div>

<script>

const CHIPS = {
  w1:{name:"Borte vott",emoji:"🧤",color:"white",number:1,chaos:1,cost:0},
  w2:{name:"Våt sokk",emoji:"🧦",color:"white",number:2,chaos:2,cost:0},
  w3:{name:"Hvor er buksa?",emoji:"👖",color:"white",number:3,chaos:3,cost:0},

  red1:{name:"Turbo-barn",emoji:"🏃",color:"red",number:1,cost:4},
  red2:{name:"Turbo-barn",emoji:"🏃",color:"red",number:2,cost:7},
  red4:{name:"Turbo-barn",emoji:"🏃",color:"red",number:4,cost:12},

  blue1:{name:"Rolig bygger",emoji:"🧱",color:"blue",number:1,cost:5},
  blue2:{name:"Rolig bygger",emoji:"🧱",color:"blue",number:2,cost:9},

  green1:{name:"Hjelpsom femåring",emoji:"🤝",color:"green",number:1,cost:5},
  green2:{name:"Hjelpsom femåring",emoji:"🤝",color:"green",number:2,cost:8},

  yellow1:{name:"Alle har sekk",emoji:"🎒",color:"yellow",number:1,cost:6},
  yellow2:{name:"Alle har sekk",emoji:"🎒",color:"yellow",number:2,cost:10},

  purple1:{name:"Magisk vikar",emoji:"🦸",color:"purple",number:1,cost:7},
  purple2:{name:"Magisk vikar",emoji:"🦸",color:"purple",number:2,cost:11}
};

const SHOP = [
  "red1","red2","red4",
  "blue1","blue2",
  "green1","green2",
  "yellow1","yellow2",
  "purple1","purple2"
];

const TRACK = [
  {points:0,money:0},
  {points:1,money:1},
  {points:2,money:1},
  {points:3,money:2,ruby:true},
  {points:4,money:2},
  {points:5,money:3},
  {points:6,money:3,bonus:true},
  {points:7,money:4},
  {points:8,money:4},
  {points:9,money:5,ruby:true},
  {points:10,money:5},
  {points:11,money:6},
  {points:12,money:6,bonus:true},
  {points:13,money:7},
  {points:14,money:8}
];

const START_BAG = ["w1","w1","w1","w2","w2","w3","red1","green1","yellow1"];

let state;

const els = {
  round:document.getElementById("round"),
  score:document.getElementById("score"),
  money:document.getElementById("money"),
  chaos:document.getElementById("chaos"),
  position:document.getElementById("position"),
  drawn:document.getElementById("drawn"),
  track:document.getElementById("track"),
  log:document.getElementById("log"),
  shop:document.getElementById("shop"),
  banner:document.getElementById("banner"),
  drawBtn:document.getElementById("drawBtn"),
  stopBtn:document.getElementById("stopBtn"),
  nextBtn:document.getElementById("nextBtn"),
  resetBtn:document.getElementById("resetBtn")
};

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function freshState(){
  return{
    round:1,
    score:0,
    money:0,
    chaos:0,
    position:0,
    bag:[...START_BAG],
    drawPile:shuffle([...START_BAG]),
    drawn:[],
    phase:"draw",
    exploded:false,
    gameOver:false
  };
}

function addLog(text){
  const p=document.createElement("p");
  p.textContent=text;
  els.log.prepend(p);
}

function chipEl(id){
  const c=CHIPS[id];
  const div=document.createElement("div");
  div.className=`chip ${c.color}`;
  div.innerHTML=`
    <span class="num">${c.number}</span>
    <div>
      <span class="emoji">${c.emoji}</span>
      ${c.name}
    </div>
  `;
  return div;
}

function drawChip(){

  if(state.phase!=="draw") return;

  if(state.drawPile.length===0){
    stopDay();
    return;
  }

  const id=state.drawPile.pop();
  const c=CHIPS[id];

  state.drawn.push(id);

  state.position += c.number;

  if(c.chaos){
    state.chaos += c.chaos;
    addLog(`${c.name}: +${c.chaos} kaos.`);
  } else {
    addLog(`${c.name} ${c.number}: flytter dagen ${c.number} felt.`);
  }

  if(id.startsWith("blue")){
    state.chaos=Math.max(0,state.chaos-1);
    addLog("Rolig bygger demper 1 kaos.");
  }

  if(id.startsWith("purple")){
    state.chaos=Math.max(0,state.chaos-2);
    addLog("Magisk vikar redder situasjonen litt.");
  }

  if(state.chaos>8){
    explodeDay();
  }

  render();
}

function currentTrackReward(){
  const pos=Math.min(state.position, TRACK.length-1);
  return TRACK[pos];
}

function stopDay(){

  if(state.phase!=="draw") return;

  state.phase="buy";

  const reward=currentTrackReward();

  let bonus=0;

  state.drawn.forEach(id=>{
    if(id.startsWith("yellow")) bonus+=1;
    if(id.startsWith("green")) state.money+=1;
  });

  state.score += reward.points + bonus;
  state.money += reward.money;

  addLog(`Du stoppet på felt ${state.position}. +${reward.points + bonus} trygghetspoeng og +${reward.money} klistremerker.`);

  render();
}

function explodeDay(){

  state.phase="buy";
  state.exploded=true;

  const reward=currentTrackReward();

  state.money += reward.money;

  addLog(`Avdelingen kokte over 😭 Du mister poengene, men beholder ${reward.money} klistremerker.`);

  render();
}

function nextRound(){

  if(state.phase!=="buy") return;

  if(state.round>=7){
    state.gameOver=true;
    state.phase="over";
    addLog(`Ferdig! Sluttscore: ${state.score}`);
    render();
    return;
  }

  state.round++;
  state.chaos=0;
  state.position=0;
  state.drawPile=shuffle([...state.bag]);
  state.drawn=[];
  state.phase="draw";
  state.exploded=false;

  addLog(`Ny dag. Nye problemer.`);
  render();
}

function buyChip(id){

  const c=CHIPS[id];

  if(state.money<c.cost) return;

  state.money -= c.cost;
  state.bag.push(id);

  addLog(`Kjøpte ${c.name} ${c.number}.`);
  render();
}

function renderTrack(){

  els.track.innerHTML="";

  TRACK.forEach((space,index)=>{

    const div=document.createElement("div");
    div.className="space";

    if(space.bonus) div.classList.add("bonus");
    if(space.ruby) div.classList.add("ruby");

    if(index===Math.min(state.position,TRACK.length-1)){
      div.classList.add("active");
    }

    div.innerHTML=`
      <div class="reward">${space.points}⭐ / ${space.money}🎟️</div>
      ${index}
    `;

    els.track.appendChild(div);

  });

}

function renderShop(){

  els.shop.innerHTML="";

  SHOP.forEach(id=>{

    const c=CHIPS[id];

    const row=document.createElement("div");
    row.className="shop-item";

    row.appendChild(chipEl(id));

    const info=document.createElement("div");
    info.innerHTML=`
      <div style="font-weight:950">${c.name} ${c.number}</div>
      <div style="font-size:.85rem;color:#7a6a5c">Pris ${c.cost}</div>
    `;

    row.appendChild(info);

    const btn=document.createElement("button");
    btn.className="buy";
    btn.textContent="Kjøp";
    btn.disabled=state.phase!=="buy" || state.money<c.cost;
    btn.onclick=()=>buyChip(id);

    row.appendChild(btn);

    els.shop.appendChild(row);

  });

}

function render(){

  els.round.textContent=`${state.round} / 7`;
  els.score.textContent=state.score;
  els.money.textContent=state.money;
  els.chaos.textContent=`${state.chaos} / 8`;
  els.position.textContent=state.position;

  renderTrack();
  renderShop();

  els.drawn.innerHTML="";

  if(!state.drawn.length){
    els.drawn.innerHTML=`<div class="empty">Ingen barn i gryta ennå. Litt FOR rolig.</div>`;
  } else {
    state.drawn.forEach(id=>{
      els.drawn.appendChild(chipEl(id));
    });
  }

  els.drawBtn.disabled=state.phase!=="draw";
  els.stopBtn.disabled=state.phase!=="draw";
  els.nextBtn.disabled=state.phase!=="buy";

  els.banner.classList.toggle("danger",state.exploded);

  if(state.gameOver){
    els.banner.textContent=`Spillet er ferdig. Sluttscore: ${state.score}`;
  } else if(state.exploded){
    els.banner.textContent="Avdelingen kokte over 😭";
  } else if(state.phase==="buy"){
    els.banner.textContent="Dagen er over. Kjøp nye brikker.";
  } else {
    els.banner.textContent="Bare én brikke til...";
  }

}

function resetGame(){
  state=freshState();
  els.log.innerHTML="";
  addLog("Velkommen til Barnehagekaos V3.");
  render();
}

els.drawBtn.onclick=drawChip;
els.stopBtn.onclick=stopDay;
els.nextBtn.onclick=nextRound;
els.resetBtn.onclick=resetGame;

resetGame();

</script>

</body>
</html>
